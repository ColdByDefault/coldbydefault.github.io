<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/1e357b3107.js" crossorigin="anonymous"></script>
    <title>Under Construction</title>
    <style>
        /* Reset margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Background styling */
        body, html {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(0deg, #020202, #02094d);
            overflow: hidden;
            color: #fff;
        }

        /* Container for the message */
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        /* Main message styling */
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: fadeIn 2s ease forwards;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 3s ease forwards;
        }

        /* Animated bouncing dots */
        .dots {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .dot {
            width: 15px;
            height: 15px;
            background-color: #fff;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Social Media Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 4s ease forwards;
        }

        .social-icons a {
            color: #129e05;
            font-size: 1.5rem;
            text-decoration: none;
            margin-top: 1rem;
            transition: transform 0.3s ease;
        }

        .social-icons a:hover {
            transform: scale(1.2);
        }

        h4{
            margin-top: 40px;
            color: #201f38;
        }

        /* Keyframe animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Website Under Construction</h1>
        <p>We're working hard to bring you something amazing. Please stay tuned!</p>
        
        <!-- Bouncing Dots -->
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Social Media Icons -->
        <div class="social-icons">
            <a href="https://linktr.ee/ColdByDefault" target="_blank" aria-label="Facebook"><i class="fa-solid fa-tree" style="color: #0f6104;"></i> Link.tree</a>
        </div>
        <div>
            <h4>ColdByDefault</h4>
        </div>
    </div>

    <!-- FontAwesome for social media icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
